# CrossRef journal sources
# Used by: src/crossref_fetcher.py
#
# To add a new journal: append an entry with its ISSN.
# Find ISSN at https://portal.issn.org or the journal's About page.
#
# Fields:
#   name         display name in report
#   issn         print or electronic ISSN (CrossRef accepts either)
#   days_back    how many days of articles to fetch (default: 14)
#   max_items    max articles to retrieve per run (default: 30)
#   bc_filter    filter to ECG-relevant articles only (default: true)
#                (kept name for backwards compat — see crossref_fetcher._passes_prescreen)
#
# CrossRef API is free, no key required.
# Polite pool: include a mailto in User-Agent (set in crossref_fetcher.py).

crossref_email: "agoodbear@gmail.com"

journals:
  # ── Electrophysiology-focused journals (high signal-to-noise for ECG) ────
  - name: Heart Rhythm
    full_name: "Heart Rhythm"
    issn: "1547-5271"
    days_back: 14
    max_items: 30
    bc_filter: true

  - name: JACC-EP
    full_name: "JACC: Clinical Electrophysiology"
    issn: "2405-500X"
    days_back: 14
    max_items: 25
    bc_filter: true

  - name: Circulation-AE
    full_name: "Circulation: Arrhythmia and Electrophysiology"
    issn: "1941-3149"
    days_back: 14
    max_items: 25
    bc_filter: true

  - name: J Electrocardiology
    full_name: "Journal of Electrocardiology"
    issn: "0022-0736"
    days_back: 21
    max_items: 25
    bc_filter: false   # already ECG-specific by definition

  # ── Emergency medicine (cardiac-relevant subset) ─────────────────────────
  - name: Annals EM
    full_name: "Annals of Emergency Medicine"
    issn: "0196-0644"
    days_back: 14
    max_items: 30
    bc_filter: true

  - name: Resuscitation
    full_name: "Resuscitation"
    issn: "0300-9572"
    days_back: 14
    max_items: 25
    bc_filter: true

  # ── 廣域 cardiology 期刊（2026-04-29 啟用）──────────────────────────────
  - name: Europace
    full_name: "Europace"
    issn: "1099-5129"
    days_back: 14
    max_items: 25
    bc_filter: true

  - name: JACC
    full_name: "Journal of the American College of Cardiology"
    issn: "0735-1097"
    days_back: 14
    max_items: 30
    bc_filter: true

  - name: European Heart J
    full_name: "European Heart Journal"
    issn: "0195-668X"
    days_back: 14
    max_items: 30
    bc_filter: true

  - name: JAMA Cardiology
    full_name: "JAMA Cardiology"
    issn: "2380-6583"
    days_back: 14
    max_items: 25
    bc_filter: true

