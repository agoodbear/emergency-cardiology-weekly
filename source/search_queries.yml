# Twitter search queries for ECG / emergency cardiology content
# Used by: fetcher.py
# Tips:
#   - Keep each query focused on one topic area
#   - "lang:en" limits to English tweets
#   - OR groups multiple synonyms
#   - Twitter search supports quoted phrases

search_queries:
  - "(ECG OR EKG) (STEMI OR OMI OR NOMI OR occlusion OR Sgarbossa OR Wellens OR \"De Winter\")"
  - "(ECG OR EKG) (Brugada OR WPW OR \"long QT\" OR LQTS OR channelopathy OR ARVC)"
  - "(ECG OR EKG) (AFib OR \"atrial fibrillation\" OR SVT OR VT OR \"ventricular tachycardia\")"
  - "(ECG OR EKG) (LBBB OR RBBB OR \"AV block\" OR Mobitz OR Wenckebach OR bifascicular)"
  - "(ECG OR EKG) (AI OR \"deep learning\" OR PMcardio OR \"Queen of Hearts\")"
  - "(ECG OR EKG) (\"Apple Watch\" OR Kardia OR AliveCor OR wearable OR smartwatch)"
  - "(ECG OR EKG) (BRASH OR hyperkalemia OR \"digoxin toxicity\" OR tricyclic)"
  - "(ECG OR EKG) (pacemaker OR ICD OR CRT OR \"loop recorder\" OR Holter)"
  - "(#FOAMed OR #EMCC) (ECG OR EKG) lang:en"
  - "(#ECG OR #EKG) (case OR teaching OR pearl OR quiz) lang:en"
  - "(emergency cardiology) (ECG OR EKG OR arrhythmia OR MI) lang:en"
  - "(cardiac arrest) (rhythm OR ROSC OR defibrillation OR \"post-arrest ECG\") lang:en"
