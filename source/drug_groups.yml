# Topic group definitions for ECG article / tweet classification
# Used by: reporter.py (trend aggregation)
# Format: group_name: [keyword, ...]  (case-insensitive matching)
# Note: YAML key is kept as `drug_groups` because src/config.py reads that key.

drug_groups:
  OMI / STEMI diagnosis:
    - STEMI
    - NSTEMI
    - OMI
    - NOMI
    - occlusion MI
    - occlusion myocardial
    - Sgarbossa
    - modified Sgarbossa
    - Barcelona
    - De Winter
    - Wellens
    - hyperacute T
    - posterior MI
    - inferior MI
    - anterior MI
    - lateral MI
    - ST elevation
    - ST depression
    - reciprocal changes

  Atrial arrhythmia:
    - atrial fibrillation
    - AFib
    - atrial flutter
    - SVT
    - supraventricular tachycardia
    - AVNRT
    - AVRT
    - focal atrial tachycardia

  Ventricular arrhythmia:
    - ventricular tachycardia
    - VT
    - VF
    - ventricular fibrillation
    - torsades
    - polymorphic VT
    - premature ventricular
    - PVC
    - electrical storm
    - pulseless VT

  Conduction blocks:
    - AV block
    - heart block
    - Mobitz
    - Wenckebach
    - complete heart block
    - bifascicular
    - trifascicular
    - LBBB
    - RBBB
    - left bundle branch
    - right bundle branch
    - hemiblock
    - fascicular block

  Channelopathy / genetic:
    - Brugada
    - WPW
    - Wolff-Parkinson-White
    - pre-excitation
    - long QT
    - LQTS
    - short QT
    - ARVC
    - arrhythmogenic right ventricular
    - CPVT
    - early repolarization
    - channelopathy

  Devices:
    - pacemaker
    - ICD
    - implantable cardioverter defibrillator
    - CRT
    - biventricular pacing
    - leadless pacemaker
    - loop recorder
    - Holter
    - event monitor

  Wearables:
    - Apple Watch
    - Kardia
    - AliveCor
    - Withings
    - Fitbit
    - smartwatch ECG
    - single-lead ECG

  AI ECG:
    - AI ECG
    - AI-ECG
    - deep learning ECG
    - machine learning ECG
    - PMcardio
    - Queen of Hearts
    - ECG interpretation AI
    - algorithm ECG

  Resuscitation rhythm:
    - cardiac arrest
    - defibrillation
    - cardioversion
    - pulseless electrical activity
    - PEA
    - asystole
    - ROSC
    - post-arrest ECG

  BRASH / tox / emergency:
    - BRASH
    - BRASH syndrome
    - hyperkalemia
    - digoxin toxicity
    - sodium channel blockade
    - tricyclic
    - hypothermia
    - Osborn wave

# Conference / event keywords (used for flagging conference content)
conference_keywords:
  - HRS
  - ESC
  - ACC
  - AHA
  - EHRA
  - ACEP
  - SAEM
  - EuroPCR
  - SCAI
  - abstract
  - conference
  - congress
  - "#HRS"
  - "#ESC"
  - "#ACC"
  - "#AHA"
  - "#EHRA"
  - "#ACEP"
  - "#FOAMed"
  - "#ECG"
  - "#EKG"
