# ECG / Emergency Cardiology relevance keywords
# Used by: webscraper (article filtering & tagging), fetcher (tweet classification)
# Add / remove terms here to tune what gets captured.
# Note: YAML key is kept as `breast_cancer_keywords` because src/config.py reads
# that specific key. Rename would require a Python change.

breast_cancer_keywords:
  # Core ECG terms
  - ECG
  - EKG
  - electrocardiogram
  - electrocardiography
  - 12-lead
  - rhythm strip
  - telemetry

  # STEMI / OMI family
  - STEMI
  - NSTEMI
  - OMI
  - NOMI
  - occlusion MI
  - occlusion myocardial infarction
  - acute coronary
  - Sgarbossa
  - modified Sgarbossa
  - Barcelona
  - De Winter
  - Wellens
  - hyperacute T
  - posterior MI
  - inferior MI
  - anterior MI
  - lateral MI
  - reciprocal changes
  - ST elevation
  - ST depression
  - T wave inversion

  # Arrhythmias
  - arrhythmia
  - atrial fibrillation
  - atrial flutter
  - AFib
  - AF
  - SVT
  - supraventricular tachycardia
  - ventricular tachycardia
  - VT
  - VF
  - ventricular fibrillation
  - torsades
  - torsades de pointes
  - polymorphic VT
  - premature ventricular
  - PVC
  - bradycardia
  - tachycardia
  - sinus pause
  - sinus arrest
  - electrical storm
  - BRASH
  - BRASH syndrome

  # Conduction / blocks
  - AV block
  - heart block
  - first-degree AV
  - second-degree AV
  - Mobitz
  - Wenckebach
  - third-degree
  - complete heart block
  - bifascicular
  - trifascicular
  - LBBB
  - RBBB
  - left bundle branch block
  - right bundle branch block
  - hemiblock
  - fascicular block
  - intraventricular conduction delay

  # Channelopathy / genetic
  - Brugada
  - WPW
  - Wolff-Parkinson-White
  - pre-excitation
  - long QT
  - LQTS
  - short QT
  - ARVC
  - arrhythmogenic right ventricular
  - CPVT
  - channelopathy
  - ion channel
  - early repolarization

  # Devices
  - pacemaker
  - ICD
  - implantable cardioverter defibrillator
  - CRT
  - biventricular pacing
  - leadless pacemaker
  - loop recorder
  - Holter
  - event monitor

  # Wearables / AI
  - Apple Watch ECG
  - Kardia
  - AliveCor
  - Withings ScanWatch
  - Fitbit ECG
  - smartwatch ECG
  - single-lead ECG
