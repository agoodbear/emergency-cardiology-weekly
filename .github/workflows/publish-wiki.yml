name: Publish Reports to Wiki

on:
  push:
    branches: [main]
    paths:
      - "reports/**.md"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed report files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            files=$(find reports -name "*.md" | sort)
          else
            files=$(git diff --name-only HEAD~1 HEAD -- "reports/*.md" | sort)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Changed report files: $files"

      - name: Setup wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          # Try to clone existing wiki; if it doesn't exist, bootstrap it
          if git clone "$WIKI_URL" wiki 2>/dev/null; then
            echo "Cloned existing wiki."
          else
            echo "Wiki not found — bootstrapping."
            mkdir wiki && cd wiki
            git init -b main
            git remote add origin "$WIKI_URL"
            # Will be populated in next step
          fi

          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Copy reports and rebuild index
        run: |
          changed_files="${{ steps.changed.outputs.files }}"
          if [ -z "$changed_files" ]; then
            echo "No report files changed — skipping."
            exit 0
          fi

          for f in $changed_files; do
            [ -f "$f" ] || continue
            cp "$f" "wiki/$(basename "$f")"
            echo "Copied $f"
          done

          # Rebuild Home.md index (newest first)
          cd wiki
          {
            echo "# 乳癌治療趨勢週報"
            echo ""
            echo "> 每週自動生成 · 資料來源：OpenEvidence、OncDaily、OncLive、ESMO、ClinicalTrials.gov"
            echo ""
            echo "| 週次 | 連結 |"
            echo "|------|------|"
            for md in $(ls [0-9][0-9][0-9][0-9]-W[0-9][0-9].md 2>/dev/null | sort -r); do
              week="${md%.md}"
              echo "| $week | [[$week]] |"
            done
          } > Home.md

      - name: Commit and push wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          cd wiki
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up-to-date."
          else
            git commit -m "wiki: $(date -u +%Y-%m-%d) — publish reports [skip ci]"
            # Force push handles both fresh init and normal update
            git push "$WIKI_URL" HEAD:main --force
          fi
